    <script>
      (function () {
        try {
          var theme = window.localStorage.getItem("theme");
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          } else if (
            theme !== "light" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
          ) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
