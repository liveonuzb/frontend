name: Frontend Launch Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: >
          npm test --
          --run
          src/lib/analytics.test.js
          src/modules/landing/pages/landing/index.test.jsx
          src/modules/auth/containers/sign-up/__tests__/password-form.test.jsx
          src/modules/admin/containers/dashboard/overview/index.test.jsx
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:running
